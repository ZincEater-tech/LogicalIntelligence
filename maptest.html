<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <style>
    body { background: #080a08; margin: 0; padding: 20px; }
    svg { width: 100%; height: auto; display: block; }
    .state { fill: #0a0f0a; stroke: #4a7c59; stroke-width: 0.5; }
    #status { color: #5c9970; font-family: monospace; font-size: 14px; padding: 10px; }
  </style>
</head>
<body>
  <div id="status">Loading...</div>
  <svg id="map" viewBox="0 0 960 600"></svg>

  <script>
    const status = document.getElementById('status');

    async function init() {
      try {
        status.textContent = 'D3 loaded: ' + (typeof d3 !== 'undefined') + ' | TopoJSON: ' + (typeof topojson !== 'undefined');

        const us = await d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json');
        status.textContent = 'Data loaded successfully';

        const projection = d3.geoAlbersUsa().scale(1100).translate([480, 300]);
        const path = d3.geoPath().projection(projection);
        const states = topojson.feature(us, us.objects.states);

        const svg = d3.select('#map');
        svg.selectAll('.state')
          .data(states.features)
          .enter()
          .append('path')
          .attr('class', 'state')
          .attr('d', path);

        // Test dot
        svg.append('circle').attr('cx', 400).attr('cy', 200).attr('r', 8).attr('fill', '#af3232');

        status.textContent = 'Map rendered successfully!';
      } catch(err) {
        status.textContent = 'ERROR: ' + err.message;
        status.style.color = '#af3232';
      }
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
